<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Tracker Nutritionnel Cloud</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 15px; }
        h1, h2 { color: #2c3e50; font-size: 1.3em; margin-top: 0; }
        .header-date { background: #3498db; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 10px; font-size: 1.2em; font-weight: bold; }
        #loading { background: #f39c12; color: white; text-align: center; padding: 8px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; display: none; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Formulaire */
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        input, select, button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; width: 100%; }
        @media (min-width: 600px) {
            input, select { width: auto; flex: 1; }
            button { width: auto; }
        }
        .btn-primary { background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { background: #27ae60; }
        .btn-secondary { background: #9b59b6; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-secondary:hover { background: #8e44ad; }
        .btn-simulation { background: #f39c12; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-simulation:hover { background: #e67e22; }
        .btn-clear { background: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; padding: 5px 10px; font-size: 0.8em; border-radius: 4px; float: right; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1.2em; padding: 0 5px; width: auto; align-self: center; }
        .btn-delete:hover { transform: scale(1.2); }
        
        /* Jauges */
        .progress-container { margin-bottom: 15px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        .progress-bar { width: 100%; background-color: #ecf0f1; border-radius: 10px; overflow: hidden; height: 20px; }
        .progress-fill { height: 100%; transition: width 0.5s ease-in-out; }
        
        .cals-fill { background-color: #e74c3c; }
        .prot-fill { background-color: #3498db; }
        .carb-fill { background-color: #f1c40f; }
        .fat-fill { background-color: #e67e22; }

        /* Liste des repas */
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { background: #f9f9f9; padding: 10px; border-left: 4px solid #3498db; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 0.95em; flex-wrap: wrap; gap: 5px; align-items: center;}
        .simulated-item { background: #fffbf0; border-left: 4px dashed #f39c12; }
        .meal-title { font-weight: bold; margin-top: 15px; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-bottom: 10px; }
        .food-info { flex: 1; }
        .food-details { color: #7f8c8d; font-size: 0.85em; display: block; }
    </style>
</head>
<body>

    <div class="header-date">
        Aujourd'hui, on est le <span id="display-date"></span>
    </div>
    
    <div id="loading">⏳ Synchronisation...</div>

    <div class="card">
        <h2>📅 1. Sélectionner une date</h2>
        <input type="date" id="date-picker" onchange="renderJournal()">
    </div>

    <div class="card">
        <h2>📊 2. Objectifs du jour</h2>
        <div class="progress-container">
            <div class="progress-label"><span>Calories (2160 kcal)</span> <span id="cals-text">0 / 2160</span></div>
            <div class="progress-bar"><div class="progress-fill cals-fill" id="cals-bar" style="width: 0%;"></div></div>
        </div>
        <div class="progress-container">
            <div class="progress-label"><span>Protéines (170g)</span> <span id="prot-text">0 / 170g</span></div>
            <div class="progress-bar"><div class="progress-fill prot-fill" id="prot-bar" style="width: 0%;"></div></div>
        </div>
        <div class="progress-container">
            <div class="progress-label"><span>Glucides (210g)</span> <span id="carb-text">0 / 210g</span></div>
            <div class="progress-bar"><div class="progress-fill carb-fill" id="carb-bar" style="width: 0%;"></div></div>
        </div>
        <div class="progress-container">
            <div class="progress-label"><span>Lipides (70g)</span> <span id="fat-text">0 / 70g</span></div>
            <div class="progress-bar"><div class="progress-fill fat-fill" id="fat-bar" style="width: 0%;"></div></div>
        </div>
    </div>

    <div class="card">
        <h2>➕ 3. Ajouter à mon repas</h2>
        <div class="form-group">
            <select id="meal-select">
                <option value="Petit-déjeuner">Petit-déjeuner</option>
                <option value="Déjeuner">Déjeuner</option>
                <option value="Collation">Collation</option>
                <option value="Dîner">Dîner</option>
            </select>
            <select id="food-select"></select>
            <input type="number" id="consume-qty" placeholder="Qté (g/ml)" required>
        </div>
        <div class="form-group">
            <button class="btn-primary" onclick="addFoodToJournal(false)">Ajouter au journal</button>
            <button class="btn-simulation" onclick="addFoodToJournal(true)">🧪 Simuler</button>
        </div>
    </div>

    <div class="card">
        <h2>🍽️ Journal du jour <button class="btn-clear" onclick="clearSimulations()">Effacer les simulations</button></h2>
        <div id="journal-list"></div>
    </div>

    <div class="card">
        <h2>⚙️ 4. Créer un nouvel aliment</h2>
        <div class="form-group">
            <input type="text" id="new-food-name" placeholder="Nom de l'aliment" required>
        </div>
        <div class="form-group">
            <input type="number" id="new-food-kcal" placeholder="Kcal/100g" required>
            <input type="number" id="new-food-prot" placeholder="Prot (g)" required>
            <input type="number" id="new-food-carb" placeholder="Gluc (g)" required>
            <input type="number" id="new-food-fat" placeholder="Lip (g)" required>
            <button class="btn-secondary" onclick="saveNewFoodToDB()">Sauvegarder l'aliment</button>
        </div>
    </div>

    <script>
        // Remets bien ton URL Apps Script ici
        const API_URL = "https://script.google.com/macros/s/AKfycbz6U7pCds5-Yt1X3oQb9w2rQBs1KpJxNXVHF0aZZYeT8nFIywTAxdbKnsgXW7fjxkJi8A/exec";
        const TARGETS = { cals: 2160, prot: 170, carb: 210, fat: 70 };
        
        let customDB = [];
        let journalLogs = [];

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-picker').value = today;
        
        // Générateur d'ID unique simple
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        async function init() { 
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                const data = await response.json();
                customDB = data.db || [];
                journalLogs = data.logs || [];
            } catch (error) {
                console.error("Erreur de connexion:", error);
            }
            document.getElementById('loading').style.display = 'none';
            
            loadFoodDropdown(); 
            renderJournal(); 
        }

        function getFullDB() {
            const uniqueDB = Array.from(new Map(customDB.map(item => [item.name, item])).values());
            uniqueDB.sort((a, b) => a.name.localeCompare(b.name));
            return uniqueDB;
        }

        function loadFoodDropdown() {
            const select = document.getElementById('food-select');
            select.innerHTML = '';
            
            if(getFullDB().length === 0) {
                let option = document.createElement('option');
                option.text = "Base vide - Ajoute un aliment ci-dessous";
                select.appendChild(option);
            } else {
                getFullDB().forEach((food, index) => {
                    let option = document.createElement('option');
                    option.value = index;
                    option.text = food.name;
                    select.appendChild(option);
                });
            }
        }

        function saveNewFoodToDB() {
            const name = document.getElementById('new-food-name').value;
            const cals = parseFloat(document.getElementById('new-food-kcal').value);
            const prot = parseFloat(document.getElementById('new-food-prot').value);
            const carb = parseFloat(document.getElementById('new-food-carb').value);
            const fat = parseFloat(document.getElementById('new-food-fat').value);

            if(!name || isNaN(cals) || isNaN(prot) || isNaN(carb) || isNaN(fat)) {
                alert("Veuillez remplir tous les champs !"); return;
            }

            const newFood = { action: "addAliment", name, cals, prot, carb, fat };
            
            customDB.push(newFood);
            loadFoodDropdown();
            
            document.getElementById('new-food-name').value = '';
            document.getElementById('new-food-kcal').value = '';
            document.getElementById('new-food-prot').value = '';
            document.getElementById('new-food-carb').value = '';
            document.getElementById('new-food-fat').value = '';

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(newFood)
            }).catch(err => console.error("Erreur sauvegarde aliment", err));
        }

        function addFoodToJournal(isSimulation) {
            const targetDate = document.getElementById('date-picker').value;
            const meal = document.getElementById('meal-select').value;
            const qty = parseFloat(document.getElementById('consume-qty').value);
            const foodIndex = document.getElementById('food-select').value;
            
            if(getFullDB().length === 0) { alert("Ajoute d'abord un aliment à ta base !"); return; }
            if(!qty || isNaN(qty)) { alert("Indiquez une quantité valide."); return; }

            const food = getFullDB()[foodIndex];
            const newLog = {
                id: isSimulation ? 'sim_' + generateId() : generateId(), // ID spécifique pour la simulation
                action: "addLog",
                date: targetDate,
                meal: meal,
                name: food.name,
                qty: qty,
                cals: Math.round((food.cals / 100) * qty),
                prot: Math.round((food.prot / 100) * qty * 10)/10,
                carb: Math.round((food.carb / 100) * qty * 10)/10,
                fat: Math.round((food.fat / 100) * qty * 10)/10,
                isSimulation: isSimulation
            };

            journalLogs.push(newLog);
            renderJournal();
            document.getElementById('consume-qty').value = '';

            if(!isSimulation) {
                document.getElementById('loading').style.display = 'block';
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(newLog)
                }).then(() => {
                    document.getElementById('loading').style.display = 'none';
                }).catch(err => {
                    console.error("Erreur sauvegarde journal", err);
                    document.getElementById('loading').style.display = 'none';
                });
            }
        }

        // NOUVELLE FONCTION : Supprimer un aliment
        function deleteLog(id, isSimulation) {
            console.log("Tentative de suppression de l'ID :", id);
            // Suppression visuelle immédiate
            journalLogs = journalLogs.filter(log => log.id !== id);
            renderJournal();

            if (!isSimulation && id && !id.startsWith('sim_')) {
                document.getElementById('loading').style.display = 'block';
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "deleteLog", id: id })
                })
                .then(response => response.text())
                .then(result => {
                    console.log("Réponse du Sheet :", result);
                    document.getElementById('loading').style.display = 'none';
                })
                .catch(err => {
                    console.error("Erreur réseau :", err);
                    document.getElementById('loading').style.display = 'none';
                });
            }
        }

        function clearSimulations() {
            journalLogs = journalLogs.filter(log => !log.isSimulation);
            renderJournal();
        }

        function renderJournal() {
            const targetDate = document.getElementById('date-picker').value;
            document.getElementById('display-date').innerText = new Date(targetDate).toLocaleDateString('fr-FR');
            
            const dayData = journalLogs.filter(f => {
                if (!f.date) return false;
                if (f.date.toString().startsWith(targetDate)) return true;
                
                const d = new Date(f.date);
                if (!isNaN(d.getTime())) {
                    const localDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    return localDate === targetDate;
                }
                return false;
            });
            
            let totalCals = 0, totalProt = 0, totalCarb = 0, totalFat = 0;
            const journal = document.getElementById('journal-list');
            journal.innerHTML = '';

            ["Petit-déjeuner", "Déjeuner", "Collation", "Dîner"].forEach(mealType => {
                const foods = dayData.filter(f => f.meal === mealType);
                if(foods.length > 0) {
                    journal.innerHTML += `<div class="meal-title">${mealType}</div><ul>` + 
                        foods.map(f => {
                            totalCals += f.cals; totalProt += f.prot; totalCarb += f.carb; totalFat += f.fat;
                            const simClass = f.isSimulation ? 'simulated-item' : '';
                            const simIcon = f.isSimulation ? '🧪 <em>(Simulation)</em> ' : '';
                            // Ajout du bouton ❌ qui appelle deleteLog avec l'ID
                            return `
                            <li class="${simClass}">
                                <div class="food-info">
                                    <strong>${f.qty}g</strong> ${f.name} <br>
                                    <small>${simIcon}</small>
                                    <span class="food-details">${f.cals} kcal (P:${f.prot}g, G:${f.carb}g, L:${f.fat}g)</span>
                                </div>
                                <button class="btn-delete" onclick="deleteLog('${f.id}', ${f.isSimulation || false})" title="Supprimer">❌</button>
                            </li>`;
                        }).join('') + `</ul>`;
                }
            });

            if(dayData.length === 0) journal.innerHTML = "<p>Rien d'enregistré pour cette date.</p>";

            document.getElementById('cals-bar').style.width = Math.min((totalCals / TARGETS.cals) * 100, 100) + '%';
            document.getElementById('cals-text').innerText = `${Math.round(totalCals)} / ${TARGETS.cals}`;
            document.getElementById('prot-bar').style.width = Math.min((totalProt / TARGETS.prot) * 100, 100) + '%';
            document.getElementById('prot-text').innerText = `${Math.round(totalProt)} / ${TARGETS.prot}g`;
            document.getElementById('carb-bar').style.width = Math.min((totalCarb / TARGETS.carb) * 100, 100) + '%';
            document.getElementById('carb-text').innerText = `${Math.round(totalCarb)} / ${TARGETS.carb}g`;
            document.getElementById('fat-bar').style.width = Math.min((totalFat / TARGETS.fat) * 100, 100) + '%';
            document.getElementById('fat-text').innerText = `${Math.round(totalFat)} / ${TARGETS.fat}g`;
        }

        init();
    </script>
</body>
</html>
